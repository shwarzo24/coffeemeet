// ── Route builder ──────────────────────────────────────────────────────────
document.getElementById('golf-build-btn').addEventListener('click', buildGolfRoute);

async function buildGolfRoute() {
  const holes  = Math.max(2, Math.min(18, parseInt(document.getElementById('golf-holes').value) || 9));
  const radius = Math.max(300, Math.min(5000, parseInt(document.getElementById('golf-radius').value) || 1500));
  const walkCapMin = Math.max(15, Math.min(240, parseInt(document.getElementById('golf-walk-cap').value) || 90));
  const themes = golfState.selectedThemes.slice();
  if (!themes.length) { setGolfStatus('Pick at least one theme.', 'error'); return; }

  // Resolve start position based on source
  let startPos, startAddress;
  if (golfState.source === 'midpoint') {
    const resolved = friends.filter(f => f.latLng);
    if (resolved.length < 2) {
      setGolfStatus('Add at least 2 friends with resolved addresses.', 'error');
      return;
    }
    const avgLat = resolved.reduce((s, f) => s + f.latLng.lat(), 0) / resolved.length;
    const avgLng = resolved.reduce((s, f) => s + f.latLng.lng(), 0) / resolved.length;
    startPos = { lat: avgLat, lng: avgLng };
    startAddress = `Friends' midpoint (${avgLat.toFixed(5)}, ${avgLng.toFixed(5)})`;
    golfState.start = { latLng: new google.maps.LatLng(avgLat, avgLng), address: startAddress };
  } else {
    if (!golfState.start) { setGolfStatus('Pick a start location first.', 'error'); return; }
    startPos = { lat: golfState.start.latLng.lat(), lng: golfState.start.latLng.lng() };
    startAddress = golfState.start.address;
  }

  // Resolve end position based on endMode
  let endPos = null, endAddress = null;
  if (golfState.endMode === 'start') {
    endPos = { ...startPos };
    endAddress = startAddress;
  } else if (golfState.endMode === 'custom') {
    if (!golfState.end) { setGolfStatus('Pick an end location or choose a different End At option.', 'error'); return; }
    endPos = { lat: golfState.end.latLng.lat(), lng: golfState.end.latLng.lng() };
    endAddress = golfState.end.address;
  }

  golfBuildBtn().disabled = true;
  setGolfStatus('Searching for venues…');
  golfResultsEl().innerHTML = '';
  golfState.finishLeg = null;

  // Fetch pool of venues (reuse beer-theme searches for pubs/bars + liquor_store/wine_bar)
  const base = { location: startPos, rankBy: google.maps.places.RankBy.DISTANCE };
  const searchDefs = [
    { keyword: 'pub' },
    { type: 'bar' },
    { keyword: 'tavern' },
    { keyword: 'RSL club' },
    { keyword: 'hotel bar' },
    { keyword: 'cocktail bar' },
    { keyword: 'cocktail lounge' },
    { keyword: 'wine bar' },
    { keyword: 'bottle shop' },
    { type: 'liquor_store' },
    { keyword: 'dive bar' },
    { keyword: 'rooftop bar' },
    { keyword: 'sky bar' },
    { keyword: 'beer garden' },
    { keyword: 'sports bar' },
  ];

  let pool;
  try {
    const results = await Promise.all(searchDefs.map(q => paginatedSearch({ ...base, ...q })));
    const seen = new Set();
    pool = [];
    for (const batch of results) {
      for (const p of batch) {
        if (seen.has(p.place_id)) continue;
        seen.add(p.place_id);
        if (!p.geometry || !p.geometry.location) continue;
        // Pub Golf: require a minimum review count so venues are trustworthy
        if ((p.user_ratings_total || 0) < 20) continue;
        // Filter: respect beer-theme typeFilter (skip pure restaurants/cafes)
        const tf = THEMES.beer.typeFilter;
        if (tf && !tf(p.types)) continue;
        const dist = haversine(startPos.lat, startPos.lng, p.geometry.location.lat(), p.geometry.location.lng());
        if (dist > radius) continue;
        p._dist = dist;
        p._tier = THEMES.beer.classifyTier(p);
        pool.push(p);
      }
    }
  } catch (err) {
    setGolfStatus(err.message, 'error');
    golfBuildBtn().disabled = false;
    return;
  }

  if (pool.length < 2) {
    setGolfStatus('Not enough venues found. Increase the radius.', 'error');
    golfBuildBtn().disabled = false;
    return;
  }

  // Expand themes to match hole count by cycling
  const themeSequence = [];
  for (let i = 0; i < holes; i++) themeSequence.push(themes[i % themes.length]);

  // Greedy nearest-neighbor: from current position, pick closest venue matching next theme
  const route = [];
  const used = new Set();
  let cursor = startPos;
  let totalWalkMeters = 0;
  // Effective travel speed blends walking (~1.35 m/s) with public transport availability.
  // Using ~3.5 m/s (≈12.6 km/h) as a soft cap so transit-reachable venues aren't excluded up front.
  // Real per-leg walking/transit times are computed via the Directions API below and may trigger
  // a "cap exceeded" warning afterwards.
  const travelCapMeters = walkCapMin * 60 * 3.5;

  // Prefer venues that are BOTH themed and well-rated, then well-rated (any),
  // only falling back to dodgy theme-matchers if nothing else is available.
  // Quality gate: ≥ 4.0 stars and ≥ 50 reviews (on top of the global ≥ 20 min).
  const QUALITY_MIN_RATING  = 4.0;
  const QUALITY_MIN_REVIEWS = 50;
  const isGoodQuality = (p) =>
    (p.rating || 0) >= QUALITY_MIN_RATING &&
    (p.user_ratings_total || 0) >= QUALITY_MIN_REVIEWS;
  // Composite quality score for ranking within a bucket (rating weighted higher,
  // review count logged so 500 and 5000 don't swing it wildly).
  const qualityScore = (p) =>
    (p.rating || 0) * 2 + Math.min(Math.log10((p.user_ratings_total || 0) + 1), 3);

  for (const themeKey of themeSequence) {
    const theme = GOLF_THEMES[themeKey];
    const hintRegex = theme.nameHints[0];

    const candidates = pool
      .filter(p => !used.has(p.place_id))
      .map(p => {
        const name = (p.name || '').toLowerCase();
        const hintMatch = hintRegex && hintRegex.test(name) ? 0 : 1;
        const d = haversine(cursor.lat, cursor.lng, p.geometry.location.lat(), p.geometry.location.lng());
        return {
          p, hintMatch, d,
          tier: p._tier,
          good: isGoodQuality(p),
          q: qualityScore(p),
        };
      })
      .sort((a, b) => {
        // "Bottlo" is a hard category (bottle shop / liquor store) — keep that,
        // but still prefer better-rated bottle shops over worse ones.
        if (themeKey === 'bottlo') {
          const aLiq = (a.p.types || []).includes('liquor_store') ? 0 : 1;
          const bLiq = (b.p.types || []).includes('liquor_store') ? 0 : 1;
          if (aLiq !== bLiq) return aLiq - bLiq;
          if (a.good !== b.good) return a.good ? -1 : 1;
          if (b.q !== a.q) return b.q - a.q;
          return a.d - b.d;
        }

        // Bucket 1: themed AND high quality (the ideal pick)
        const aBest = a.hintMatch === 0 && a.good;
        const bBest = b.hintMatch === 0 && b.good;
        if (aBest !== bBest) return aBest ? -1 : 1;
        if (aBest && bBest) {
          if (b.q !== a.q) return b.q - a.q;
          return a.d - b.d;
        }

        // Bucket 2: high quality (themed or not) — don't force a bad themed match
        if (a.good !== b.good) return a.good ? -1 : 1;
        if (a.good && b.good) {
          // Both good → prefer themed, then higher quality, then closer
          if (a.hintMatch !== b.hintMatch) return a.hintMatch - b.hintMatch;
          if (b.q !== a.q) return b.q - a.q;
          return a.d - b.d;
        }

        // Bucket 3: dodgy — rank by tier, then quality, then distance. Hint
        // match is deliberately ignored here so we don't force a low-quality
        // theme-matcher ahead of a slightly better non-themed venue.
        if (a.tier !== b.tier) return a.tier - b.tier;
        if (b.q !== a.q) return b.q - a.q;
        return a.d - b.d;
      });

    if (!candidates.length) break;
    const pick = candidates[0];
    // Check travel cap (walking- or transit-reachable within cap)
    if (totalWalkMeters + pick.d > travelCapMeters) {
      golfState.warning = `Travel cap reached — built ${route.length} of ${holes} holes.`;
      break;
    }
    totalWalkMeters += pick.d;
    used.add(pick.p.place_id);
    route.push({
      place: pick.p,
      theme: themeKey,
      drink: theme.drinks[0],
      score: '',
      leg: { distanceMeters: pick.d, durationSec: Math.round(pick.d / 1.35) },
    });
    cursor = { lat: pick.p.geometry.location.lat(), lng: pick.p.geometry.location.lng() };
  }

  if (route.length < 2) {
    setGolfStatus('Could not build a route with those constraints. Try more themes or a bigger radius.', 'error');
    golfBuildBtn().disabled = false;
    return;
  }

  if (route.length < holes && !golfState.warning) {
    golfState.warning = `Only ${route.length} suitable venues found.`;
  } else if (route.length >= holes) {
    golfState.warning = null;
  }

  // Compute finish leg (if endMode != 'last') using haversine as fallback
  if (endPos) {
    const last = route[route.length - 1].place.geometry.location;
    const d = haversine(last.lat(), last.lng(), endPos.lat, endPos.lng);
    golfState.finishLeg = {
      distanceMeters: d,
      durationSec: Math.round(d / 1.35),
      label: golfState.endMode === 'start' ? 'Back to start' : 'Finish',
      endAddress,
    };
  }

  // Refine with Directions API: walking + transit, pick faster per leg
  setGolfStatus('Calculating walking & transit routes…');
  try {
    await refineRouteWithDirections(startPos, route, endPos);
  } catch (e) {
    // Non-fatal: fall back to haversine estimates
    console.warn('Directions API failed, using straight-line estimates:', e);
  }

  // Enforce travel cap on real per-leg durations (post-refinement, using chosen mode per leg)
  const totalTravelSec = route.reduce((s, r) => s + (r.leg?.durationSec || 0), 0) + (golfState.finishLeg?.durationSec || 0);
  const capSec = walkCapMin * 60;
  if (totalTravelSec > capSec) {
    const overMin = Math.ceil((totalTravelSec - capSec) / 60);
    golfState.warning = `Travel cap exceeded by ~${overMin} min (uses fastest of walking/transit per leg).`;
  }

  golfState.route = route;
  renderGolfResults();
  drawGolfRouteOnMap(startPos, route);
  golfBuildBtn().disabled = false;
  if (golfState.warning) setGolfStatus(golfState.warning, 'warn');
  else setGolfStatus(`${route.length}-hole route built.`);
}

function refineRouteWithDirections(startPos, route, endPos) {
  if (!window.google || !google.maps.DirectionsService) {
    return Promise.reject(new Error('Directions unavailable'));
  }
  const hasFinish = !!endPos;
  const destination = hasFinish
    ? endPos
    : { lat: route[route.length - 1].place.geometry.location.lat(), lng: route[route.length - 1].place.geometry.location.lng() };
  const waypointHoles = hasFinish ? route : route.slice(0, -1);
  const waypoints = waypointHoles.map(r => ({
    location: { lat: r.place.geometry.location.lat(), lng: r.place.geometry.location.lng() },
    stopover: true,
  }));

  const runMode = (travelMode) => new Promise((resolve) => {
    const ds = new google.maps.DirectionsService();
    // Transit doesn't accept multi-waypoint routes — run leg by leg.
    if (travelMode === google.maps.TravelMode.TRANSIT) {
      const stops = [startPos, ...route.map(r => ({ lat: r.place.geometry.location.lat(), lng: r.place.geometry.location.lng() }))];
      if (hasFinish) stops.push(endPos);
      const legPromises = [];
      for (let i = 0; i < stops.length - 1; i++) {
        legPromises.push(new Promise((res2) => {
          const ds2 = new google.maps.DirectionsService();
          ds2.route({
            origin: stops[i], destination: stops[i + 1],
            travelMode: google.maps.TravelMode.TRANSIT,
          }, (r, s) => {
            if (s === 'OK' && r && r.routes[0] && r.routes[0].legs[0]) {
              const L = r.routes[0].legs[0];
              res2({ ok: true, distanceMeters: L.distance.value, durationSec: L.duration.value, distanceText: L.distance.text, durationText: L.duration.text, rawResult: r });
            } else {
              res2({ ok: false });
            }
          });
        }));
      }
      Promise.all(legPromises).then(legs => resolve({ mode: 'transit', legs, result: null }));
      return;
    }
    // Walking: single multi-waypoint call
    ds.route({
      origin: startPos, destination, waypoints,
      optimizeWaypoints: false,
      travelMode: google.maps.TravelMode.WALKING,
    }, (res, status) => {
      if (status !== 'OK' || !res || !res.routes[0]) { resolve({ mode: 'walking', legs: [], result: null }); return; }
      const legs = res.routes[0].legs.map(L => ({
        ok: true,
        distanceMeters: L.distance.value,
        durationSec:    L.duration.value,
        distanceText:   L.distance.text,
        durationText:   L.duration.text,
      }));
      resolve({ mode: 'walking', legs, result: res });
    });
  });

  return Promise.all([
    runMode(google.maps.TravelMode.WALKING),
    runMode(google.maps.TravelMode.TRANSIT),
  ]).then(([walk, transit]) => {
    if (!walk.legs.length && !transit.legs.some(l => l.ok)) {
      throw new Error('No routes available');
    }
    const totalLegs = route.length + (hasFinish ? 1 : 0);
    for (let i = 0; i < totalLegs; i++) {
      const w = walk.legs[i];
      const t = transit.legs[i];
      let chosen, mode;
      const wOk = w && w.ok;
      const tOk = t && t.ok;
      if (wOk && tOk) {
        if (t.durationSec < w.durationSec) { chosen = t; mode = 'transit'; }
        else                                 { chosen = w; mode = 'walking'; }
      } else if (wOk) { chosen = w; mode = 'walking'; }
      else if (tOk)   { chosen = t; mode = 'transit'; }
      else continue;

      // Extract per-leg path (array of LatLng) and transit details if applicable
      let path = null, transitDetails = null;
      if (mode === 'walking' && walk.result?.routes?.[0]?.legs?.[i]) {
        path = extractPathFromLeg(walk.result.routes[0].legs[i]);
      } else if (mode === 'transit' && t.rawResult?.routes?.[0]?.legs?.[0]) {
        const tleg = t.rawResult.routes[0].legs[0];
        path = extractPathFromLeg(tleg);
        transitDetails = extractTransitSummary(tleg);
      }

      const legData = {
        distanceMeters: chosen.distanceMeters,
        durationSec:    chosen.durationSec,
        distanceText:   chosen.distanceText,
        durationText:   chosen.durationText,
        mode,
        path,
        transit: transitDetails,
      };
      if (i < route.length) {
        route[i].leg = legData;
      } else if (hasFinish && golfState.finishLeg) {
        Object.assign(golfState.finishLeg, legData);
      }
    }
    golfState.directionsResult = walk.result;
  });
}

// Concatenate step paths into a single polyline point array for one leg.
function extractPathFromLeg(leg) {
  if (!leg) return null;
  const pts = [];
  if (leg.steps && leg.steps.length) {
    for (const step of leg.steps) {
      if (step.path && step.path.length) {
        for (const pt of step.path) pts.push(pt);
      } else if (step.start_location && step.end_location) {
        pts.push(step.start_location, step.end_location);
      }
    }
  } else if (leg.start_location && leg.end_location) {
    pts.push(leg.start_location, leg.end_location);
  }
  return pts.length ? pts : null;
}

// Find the first transit step on a leg and summarise its vehicle + line.
function extractTransitSummary(leg) {
  if (!leg || !leg.steps) return null;
  const segments = [];
  for (const step of leg.steps) {
    if (step.travel_mode === 'TRANSIT' && step.transit) {
      const td = step.transit;
      const line = td.line || {};
      const vehicle = line.vehicle || {};
      segments.push({
        type: (vehicle.type || 'BUS').toUpperCase(),
        vehicleName: vehicle.name || '',
        lineName: line.name || '',
        lineShort: line.short_name || '',
        lineColor: line.color || null,
        textColor: line.text_color || null,
        numStops: td.num_stops,
        departure: td.departure_stop?.name,
        arrival: td.arrival_stop?.name,
        headsign: td.headsign,
      });
    }
  }
  if (!segments.length) return null;
  // Use the first segment as the primary label; keep all for tooltip detail
  return { primary: segments[0], segments };
}

// ── Render scorecard ───────────────────────────────────────────────────────
function renderGolfResults() {
  const el = golfResultsEl();
  const route = golfState.route;
  const finish = golfState.finishLeg;
  const totalSec = route.reduce((s, r) => s + (r.leg?.durationSec || 0), 0) + (finish?.durationSec || 0);
  const totalMeters = route.reduce((s, r) => s + (r.leg?.distanceMeters || 0), 0) + (finish?.distanceMeters || 0);

  const fmt = (sec) => {
    const m = Math.round(sec / 60);
    return m < 60 ? `${m} min` : `${Math.floor(m/60)}h ${m%60}m`;
  };
  const fmtD = (m) => m >= 1000 ? (m/1000).toFixed(1) + ' km' : Math.round(m) + ' m';

  const modeIcon = (leg) => {
    if (!leg) return '🚶';
    if (leg.mode === 'transit' && leg.transit?.primary) return transitEmoji(leg.transit.primary.type);
    return leg.mode === 'transit' ? '🚆' : '🚶';
  };
  const legTransitLabel = (leg) => {
    if (leg?.mode !== 'transit' || !leg.transit?.primary) return '';
    const info = leg.transit.primary;
    const line = info.lineShort || info.lineName || '';
    const typeLbl = transitTypeLabel(info.type);
    return line ? ` · ${typeLbl} ${escapeHTML(line)}` : ` · ${typeLbl}`;
  };
  const anyTransit = route.some(r => r.leg?.mode === 'transit') || (finish && finish.mode === 'transit');
  const travelLabel = anyTransit ? 'walking + transit' : 'walking';

  let html = `
    <div id="route-summary">
      <div><strong>${route.length} holes</strong> · 🚶${anyTransit ? '🚆' : ''} ${fmt(totalSec)} ${travelLabel} · ${fmtD(totalMeters)} total</div>
    </div>
    <button id="export-btn">🗺️ Open route in Google Maps</button>
  `;

  route.forEach((r, i) => {
    const t = GOLF_THEMES[r.theme];
    const legText = r.leg?.durationText || fmt(r.leg?.durationSec || 0);
    const legDist = r.leg?.distanceText || fmtD(r.leg?.distanceMeters || 0);
    const drinkOptions = t.drinks.map(d => `<option${d === r.drink ? ' selected' : ''}>${d}</option>`).join('');
    html += `
      <div class="hole-card" data-idx="${i}">
        <span class="hole-num">Hole ${i+1}</span>
        <div class="hole-venue">${t.emoji} ${escapeHTML(r.place.name)}</div>
        <div class="hole-meta">${escapeHTML(r.place.vicinity || r.place.formatted_address || '')}</div>
        <div><span class="hole-theme">${t.name}</span></div>
        <div class="hole-drink-row">
          <select class="hole-drink-select" data-idx="${i}">
            ${drinkOptions}
            <option value="__custom__"${t.drinks.includes(r.drink) ? '' : ' selected'}>+ Custom…</option>
          </select>
          <span class="hole-score-label">Pts</span>
          <input class="hole-score" data-idx="${i}" type="number" value="${r.score}" placeholder="–" />
        </div>
        <div class="leg-info">${modeIcon(r.leg)} ${legText} · ${legDist} from ${i === 0 ? 'start' : 'previous hole'}${legTransitLabel(r.leg)}</div>
      </div>
    `;
  });

  if (finish) {
    const finText = finish.durationText || fmt(finish.durationSec);
    const finDist = finish.distanceText || fmtD(finish.distanceMeters);
    const finEndLabel = escapeHTML(finish.endAddress || (finish.label === 'Back to start' ? 'start' : 'finish'));
    html += `
      <div class="hole-card">
        <span class="hole-num" style="background:var(--find-btn-grad);">🏁 Finish</span>
        <div class="hole-venue">${finish.label}</div>
        <div class="hole-meta">${finEndLabel}</div>
        <div class="leg-info">${modeIcon(finish)} ${finText} · ${finDist} from final hole${legTransitLabel(finish)}</div>
      </div>
    `;
  }

  const totalScore = route.reduce((s, r) => s + (parseInt(r.score) || 0), 0);
  html += `<div class="total-score">Total score <span id="total-score-val">${totalScore}</span></div>`;

  el.innerHTML = html;

  document.getElementById('export-btn').addEventListener('click', exportGolfRouteToMaps);
  el.querySelectorAll('.hole-drink-select').forEach(sel => {
    sel.addEventListener('change', () => {
      const idx = parseInt(sel.dataset.idx);
      if (sel.value === '__custom__') {
        const custom = prompt('Custom drink for this hole:');
        if (custom) {
          golfState.route[idx].drink = custom;
          const opt = document.createElement('option');
          opt.textContent = custom; opt.selected = true;
          sel.insertBefore(opt, sel.firstChild);
        } else {
          sel.value = golfState.route[idx].drink;
        }
      } else {
        golfState.route[idx].drink = sel.value;
      }
    });
  });
  el.querySelectorAll('.hole-score').forEach(inp => {
    inp.addEventListener('input', () => {
      const idx = parseInt(inp.dataset.idx);
      golfState.route[idx].score = inp.value;
      const total = golfState.route.reduce((s, r) => s + (parseInt(r.score) || 0), 0);
      document.getElementById('total-score-val').textContent = total;
    });
  });
}

function escapeHTML(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function exportGolfRouteToMaps() {
  const route = golfState.route;
  if (!route.length || !golfState.start) return;
  const origin = encodeURIComponent(golfState.start.address);

  // Determine destination + waypoints based on endMode
  let destLL, wpHoles;
  if (golfState.endMode === 'start') {
    destLL = `${golfState.start.latLng.lat()},${golfState.start.latLng.lng()}`;
    wpHoles = route;
  } else if (golfState.endMode === 'custom' && golfState.end) {
    destLL = `${golfState.end.latLng.lat()},${golfState.end.latLng.lng()}`;
    wpHoles = route;
  } else {
    const last = route[route.length - 1].place;
    destLL = `${last.geometry.location.lat()},${last.geometry.location.lng()}`;
    wpHoles = route.slice(0, -1);
  }
  const wps = wpHoles.map(r => `${r.place.geometry.location.lat()},${r.place.geometry.location.lng()}`).join('|');
  const url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destLL}&travelmode=walking${wps ? `&waypoints=${encodeURIComponent(wps)}` : ''}`;
  window.open(url, '_blank');
}

// ── Map overlay for golf route ─────────────────────────────────────────────
let golfMapObjects = [];
function clearGolfMap() {
  golfMapObjects.forEach(o => o.setMap(null));
  golfMapObjects = [];
  const legendEl = document.getElementById('golf-map-legend');
  if (legendEl) { legendEl.style.display = 'none'; legendEl.innerHTML = ''; }
}

// Colour + style per travel mode. Walking is drawn as a dashed theme-coloured
// line; transit is a solid colour keyed to the vehicle type (bus/train/tram/…).
function transitPolylineStyle(mode, transitType) {
  if (mode !== 'transit') {
    return { color: '#1f3a2b', weight: 4, opacity: 0.75, dashed: true };
  }
  const t = (transitType || '').toUpperCase();
  if (['HEAVY_RAIL', 'COMMUTER_TRAIN', 'HIGH_SPEED_TRAIN', 'LONG_DISTANCE_TRAIN', 'METRO_RAIL', 'RAIL', 'MONORAIL'].includes(t)) {
    return { color: '#d02a2a', weight: 5, opacity: 0.9, dashed: false };
  }
  if (t === 'SUBWAY') {
    return { color: '#b52a8a', weight: 5, opacity: 0.9, dashed: false };
  }
  if (['TRAM', 'LIGHT_RAIL', 'CABLE_CAR', 'FUNICULAR', 'GONDOLA_LIFT'].includes(t)) {
    return { color: '#8a3ab9', weight: 5, opacity: 0.9, dashed: false };
  }
  if (t === 'FERRY') {
    return { color: '#1c9a9a', weight: 5, opacity: 0.9, dashed: false };
  }
  if (['SHARE_TAXI', 'TROLLEYBUS', 'INTERCITY_BUS'].includes(t)) {
    return { color: '#3a7ad6', weight: 5, opacity: 0.9, dashed: false };
  }
  // Bus + fallback
  return { color: '#2a6fd6', weight: 5, opacity: 0.9, dashed: false };
}

function transitEmoji(transitType) {
  const t = (transitType || '').toUpperCase();
  if (t === 'SUBWAY') return '🚇';
  if (['TRAM', 'LIGHT_RAIL', 'CABLE_CAR', 'FUNICULAR', 'GONDOLA_LIFT'].includes(t)) return '🚊';
  if (['HEAVY_RAIL', 'COMMUTER_TRAIN', 'HIGH_SPEED_TRAIN', 'LONG_DISTANCE_TRAIN', 'METRO_RAIL', 'RAIL', 'MONORAIL'].includes(t)) return '🚆';
  if (t === 'FERRY') return '⛴️';
  if (['SHARE_TAXI'].includes(t)) return '🚖';
  return '🚌';
}

function transitTypeLabel(transitType) {
  const t = (transitType || '').toUpperCase();
  if (t === 'SUBWAY') return 'Subway';
  if (t === 'TRAM' || t === 'LIGHT_RAIL') return 'Tram';
  if (t === 'CABLE_CAR') return 'Cable car';
  if (t === 'FUNICULAR') return 'Funicular';
  if (t === 'GONDOLA_LIFT') return 'Gondola';
  if (['HEAVY_RAIL', 'COMMUTER_TRAIN', 'METRO_RAIL', 'RAIL'].includes(t)) return 'Train';
  if (t === 'HIGH_SPEED_TRAIN') return 'High-speed train';
  if (t === 'LONG_DISTANCE_TRAIN') return 'Long-distance train';
  if (t === 'MONORAIL') return 'Monorail';
  if (t === 'FERRY') return 'Ferry';
  if (t === 'SHARE_TAXI') return 'Share taxi';
  if (t === 'TROLLEYBUS') return 'Trolleybus';
  if (t === 'INTERCITY_BUS') return 'Intercity bus';
  return 'Bus';
}

// Build a small pill-shaped SVG badge (emoji + short line label) used as a
// custom map marker icon for transit legs.
function transitBadgeSVG(emoji, label, bgColor) {
  const text = (label || '').replace(/[<>&'"]/g, '');
  const svg = `
    <svg xmlns='http://www.w3.org/2000/svg' width='68' height='26' viewBox='0 0 68 26'>
      <rect x='0.5' y='0.5' width='67' height='25' rx='13' ry='13'
            fill='${bgColor}' stroke='#ffffff' stroke-width='1.5'/>
      <text x='10' y='18' font-family='-apple-system,Segoe UI,sans-serif'
            font-size='13' fill='#ffffff'>${emoji}</text>
      <text x='30' y='18' font-family='-apple-system,Segoe UI,sans-serif'
            font-size='11' font-weight='700' fill='#ffffff'>${text}</text>
    </svg>`.replace(/\s+/g, ' ').trim();
  return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
}

function drawGolfRouteOnMap(startPos, route) {
  clearGolfMap();
  if (!map) return;

  // Start marker
  golfMapObjects.push(new google.maps.Marker({
    map, position: startPos,
    label: { text: 'S', color: '#fff', fontWeight: '800', fontSize: '12px' },
    icon: {
      path: google.maps.SymbolPath.CIRCLE, scale: 12,
      fillColor: '#1f3a2b', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2,
    },
    zIndex: 100,
  }));

  // Hole markers
  route.forEach((r, i) => {
    golfMapObjects.push(new google.maps.Marker({
      map,
      position: { lat: r.place.geometry.location.lat(), lng: r.place.geometry.location.lng() },
      label: { text: String(i + 1), color: '#fff', fontWeight: '800', fontSize: '12px' },
      icon: {
        path: google.maps.SymbolPath.CIRCLE, scale: 13,
        fillColor: '#e8a317', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2,
      },
      title: r.place.name,
      zIndex: 90,
    }));
  });

  // Determine finish position up-front so the last leg can target it
  let finishPos = null;
  if (golfState.endMode === 'custom' && golfState.end) {
    finishPos = { lat: golfState.end.latLng.lat(), lng: golfState.end.latLng.lng() };
  } else if (golfState.endMode === 'start') {
    finishPos = startPos;
  }

  // Build per-leg stops list and draw each leg with a mode-specific polyline
  const stops = [startPos, ...route.map(r => ({ lat: r.place.geometry.location.lat(), lng: r.place.geometry.location.lng() }))];
  if (finishPos && (golfState.endMode === 'custom' || golfState.endMode === 'start')) stops.push(finishPos);

  const totalLegs = stops.length - 1;
  for (let i = 0; i < totalLegs; i++) {
    const leg = i < route.length ? route[i].leg : golfState.finishLeg;
    if (!leg) continue;
    const style = transitPolylineStyle(leg.mode, leg.transit?.primary?.type);
    const path = (leg.path && leg.path.length >= 2) ? leg.path : [stops[i], stops[i + 1]];

    const polyOpts = {
      map, path,
      strokeColor:   style.color,
      strokeWeight:  style.weight,
      strokeOpacity: style.dashed ? 0 : style.opacity,
      zIndex: leg.mode === 'transit' ? 85 : 80,
    };
    if (style.dashed) {
      polyOpts.icons = [{
        icon: { path: 'M 0,-1 0,1', strokeOpacity: 1, strokeColor: style.color, scale: 3 },
        offset: '0',
        repeat: '12px',
      }];
    }
    golfMapObjects.push(new google.maps.Polyline(polyOpts));

    // Transit badge marker at the midpoint of the leg
    if (leg.mode === 'transit' && leg.transit?.primary && path.length) {
      const mid = path[Math.floor(path.length / 2)];
      const info = leg.transit.primary;
      const emoji = transitEmoji(info.type);
      const badgeText = info.lineShort || info.lineName || info.vehicleName || transitTypeLabel(info.type);
      const shortText = (badgeText || '').slice(0, 6);
      const title = [
        `${emoji} ${transitTypeLabel(info.type)}`,
        info.lineName ? `Line: ${info.lineName}` : '',
        info.numStops ? `${info.numStops} stop${info.numStops > 1 ? 's' : ''}` : '',
        info.departure ? `From: ${info.departure}` : '',
        info.arrival ? `To: ${info.arrival}` : '',
      ].filter(Boolean).join('\n');

      golfMapObjects.push(new google.maps.Marker({
        map,
        position: mid.lat ? { lat: typeof mid.lat === 'function' ? mid.lat() : mid.lat, lng: typeof mid.lng === 'function' ? mid.lng() : mid.lng } : mid,
        icon: {
          url: transitBadgeSVG(emoji, shortText, style.color),
          scaledSize: new google.maps.Size(68, 26),
          anchor: new google.maps.Point(34, 13),
        },
        title,
        zIndex: 95,
      }));
    }
  }

  // Finish marker (only if endMode is 'custom'; 'start' reuses the start marker)
  if (finishPos && golfState.endMode === 'custom') {
    golfMapObjects.push(new google.maps.Marker({
      map, position: finishPos,
      label: { text: 'F', color: '#fff', fontWeight: '800', fontSize: '12px' },
      icon: {
        path: google.maps.SymbolPath.CIRCLE, scale: 12,
        fillColor: '#c04040', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2,
      },
      zIndex: 100,
    }));
  }

  // Fit bounds
  const bounds = new google.maps.LatLngBounds();
  bounds.extend(startPos);
  route.forEach(r => bounds.extend(r.place.geometry.location));
  if (finishPos) bounds.extend(finishPos);
  map.fitBounds(bounds, { padding: 80 });

  // Render map legend (shows walking + each distinct transit type in the route)
  renderGolfMapLegend(route);
}

function renderGolfMapLegend(route) {
  const legendEl = document.getElementById('golf-map-legend');
  if (!legendEl) return;
  const all = [...route.map(r => r.leg), golfState.finishLeg].filter(Boolean);
  const hasWalking = all.some(l => l.mode === 'walking');
  const transitTypes = new Map(); // type -> style
  for (const l of all) {
    if (l.mode === 'transit' && l.transit?.primary) {
      const t = (l.transit.primary.type || 'BUS').toUpperCase();
      if (!transitTypes.has(t)) transitTypes.set(t, transitPolylineStyle('transit', t));
    }
  }

  if (!hasWalking && transitTypes.size === 0) {
    legendEl.style.display = 'none';
    legendEl.innerHTML = '';
    return;
  }

  let html = '<div class="legend-title">Route legs</div>';
  if (hasWalking) {
    const walkStyle = transitPolylineStyle('walking');
    html += `
      <div class="legend-row">
        <span class="legend-swatch dashed" style="color:${walkStyle.color}"></span>
        <span>🚶 Walking</span>
      </div>`;
  }
  for (const [type, style] of transitTypes) {
    const emoji = transitEmoji(type);
    const label = transitTypeLabel(type);
    html += `
      <div class="legend-row">
        <span class="legend-swatch" style="background:${style.color}"></span>
        <span>${emoji} ${label}</span>
      </div>`;
  }
  legendEl.innerHTML = html;
  legendEl.style.display = 'block';
}

// Wrap clearResults to also clear golf map
const origClearResults = clearResults;
clearResults = function () {
  origClearResults();
  clearGolfMap();
  golfState.route = [];
  if (golfResultsEl()) golfResultsEl().innerHTML = '';
};

const origOnMapsReady = window.onMapsReady;
window.onMapsReady = function () {
  origOnMapsReady();
  if (golfState.mode === 'golf') attachGolfAutocomplete();
};
